<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 70" role="img" aria-label="Hudi">
  <defs>
    <linearGradient id="hudi-mark-deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#213E93" />
      <stop offset="100%" stop-color="#102157" />
    </linearGradient>
    <linearGradient id="hudi-mark-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="hudi-mark-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="28" height="70" fill="url(#hudi-mark-deep)" />
  <g filter="url(#hudi-mark-shadow)">
    <rect x="14" y="18" width="34" height="34" fill="url(#hudi-mark-light)" opacity="0.65" />
  </g>
</svg>
