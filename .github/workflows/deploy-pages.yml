name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Avoid a loop when this workflow syncs the built site into docs/.
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Validate and export
        run: npm run check
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
      - name: Prepare docs/ for legacy Pages source
        run: npm run prepare:docs-pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out
      - name: Publish docs/ for branch Pages source
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          target-folder: docs
          branch: main
          clean: true
          commit-message: "chore: sync docs/ for GitHub Pages"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
