<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 100" role="img" aria-labelledby="hudi-lockup-title">
  <title id="hudi-lockup-title">Hudi Delivery</title>
  <defs>
    <linearGradient id="lockup-deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#213E93" />
      <stop offset="100%" stop-color="#102157" />
    </linearGradient>
    <linearGradient id="lockup-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="lockup-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.25" />
    </filter>
  </defs>
  <rect x="20" y="15" width="28" height="70" fill="url(#lockup-deep)" />
  <g filter="url(#lockup-shadow)">
    <rect x="34" y="33" width="34" height="34" fill="url(#lockup-light)" opacity="0.65" />
  </g>
  <text x="85" y="68" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#1E3A8A">HUDI</text>
  <text x="220" y="68" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="500" letter-spacing="-1" fill="#64748B">Delivery</text>
</svg>
